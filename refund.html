<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Return and Refund Policy | Warepro</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <section class="legal-page"><div class="container" id="legal-content"></div></section>
  <div id="site-footer"></div>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    renderLegalPage('Return and Refund Policy', `
      <p>Last updated: ${new Date().getFullYear()}</p>
      <p>At <strong>Warepro</strong>, we want you to shop with confidence. This Return and Refund Policy explains when and how you can request a return or refund for orders placed on our website.</p>

      <h2>1. Return &amp; Refund Window</h2>
      <p>You may initiate a return or refund request within <strong>15 days from the date of purchase</strong> (order confirmation date), provided the item meets the eligibility criteria below.</p>

      <h2>2. Eligible Returns &amp; Refunds</h2>
      <ul>
        <li>License key not delivered within 48 hours of payment</li>
        <li>Software is defective and cannot be activated after vendor support intervention</li>
        <li>Wrong product or license delivered</li>
        <li>Duplicate or incorrect payment charged</li>
        <li>Physical accessory received damaged, defective or incorrect</li>
        <li>Physical accessory returned unused in original packaging within 15 days</li>
      </ul>

      <h2>3. How to Request a Return or Refund</h2>
      <ol>
        <li>Contact us with your <strong>transaction ID</strong>, order details and reason for return/refund.</li>
        <li>Share screenshots or photos if the product is defective, incorrect or damaged.</li>
        <li>Our support team will review your request and respond within 1–2 business days.</li>
        <li>For approved physical returns, we may arrange a pickup or ask you to ship the item back.</li>
      </ol>
      <p>Email <a href="mailto:support@wareprotechpvtltd.in">support@wareprotechpvtltd.in</a> or call <a href="tel:+918826623286">+91 8826623286</a>.</p>

      <h2>4. Refund Processing</h2>
      <ul>
        <li><strong>Online payments:</strong> Approved refunds are credited to the original payment method within <strong>5–7 business days</strong> via Razorpay.</li>
        <li><strong>Digital products:</strong> Refunds are not available once a license key has been activated or used, unless the product is defective.</li>
        <li><strong>Shipping charges:</strong> Delivery fees are non-refundable unless the return is due to our error.</li>
        <li><strong>Replacement:</strong> Where possible, we may offer a replacement license or product instead of a refund.</li>
      </ul>

      <h2>5. Non-Returnable &amp; Non-Refundable Items</h2>
      <ul>
        <li>Activated or used software license keys</li>
        <li>Change of mind after license delivery</li>
        <li>Incompatibility with your system (please check requirements before purchase)</li>
        <li>Opened or used physical accessories</li>
        <li>Requests raised after the 15-day return window</li>
      </ul>

      <h2>6. Cancellations</h2>
      <p>Orders cancelled before license delivery or dispatch are eligible for a full refund. See our <a href="cancellation.html">Cancellation Policy</a> for details.</p>

      <h2>7. Contact</h2>
      <p>Phone: <a href="tel:+918826623286">+91 8826623286</a> | Email: <a href="mailto:support@wareprotechpvtltd.in">support@wareprotechpvtltd.in</a></p>
      <p>F-020, FF GNS Plaza, Site 4 Kasna, Greater Noida, Gautam Buddha Nagar, UP 201310.</p>
    `);
