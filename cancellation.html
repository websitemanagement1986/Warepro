    renderLegalPage('Cancellation Policy', `
      <p><em>Last updated: July 2026</em></p>
      <h2>1. Before Payment</h2>
      <p>You may cancel your order at any time before completing payment. Simply close the Razorpay payment window or navigate away from the checkout page. No charges will be applied.</p>
      <h2>2. After Payment</h2>
      <p>Once payment is successfully completed and a transaction ID is issued, the order is considered confirmed. For digital software products, cancellation after license delivery is subject to our <a href="refund.html">Refund Policy</a>.</p>
      <h2>3. Payment Failures</h2>
      <p>If your payment fails or is declined, no order is placed and no amount is deducted. You may retry checkout at any time.</p>
      <h2>4. Subscription Products</h2>
      <p>For subscription-based software (monthly/yearly plans), cancellation of auto-renewal must be done through the respective software vendor's portal after activation. Warepro can assist with vendor contact details.</p>
      <h2>5. How to Cancel / Request Help</h2>
      <p>Contact us within 24 hours of purchase if you need to cancel before license delivery:</p>
      <ul>
        <li>Email: <a href="mailto:support@warepro.in">support@warepro.in</a></li>
        <li>Phone: <a href="tel:+918826623286">+91 8826623286</a></li>
        <li>Include your transaction ID in all communications</li>
      </ul>
      <h2>6. Processing Time</h2>
      <p>Cancellation requests are processed within 1–2 business days. If a refund is applicable, it will be processed as per our Refund Policy.</p>
    `);
